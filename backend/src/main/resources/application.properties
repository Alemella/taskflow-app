spring.datasource.url=${TASKFLOW_DB_URL:jdbc:postgresql://localhost:5432/taskflow_db}
spring.datasource.username=${TASKFLOW_DB_USERNAME:postgres}
spring.datasource.password=${TASKFLOW_DB_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=${TASKFLOW_JPA_DDL_AUTO:update}
spring.jpa.show-sql=${TASKFLOW_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8080}